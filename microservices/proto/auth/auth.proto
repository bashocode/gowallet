syntax = "proto3";

package auth;

option go_package = "github.com/bashocode/gowallet/microservices/auth-service/proto/auth";

service AuthService {
  rpc CleanupExpiredRefreshTokens (CleanupRequest) returns (CleanupResponse);
}

message CleanupRequest {}

message CleanupResponse {
  int32 deleted_count = 1;
}
