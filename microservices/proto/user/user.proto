syntax = "proto3";

package user;

option go_package = "github.com/bashocode/gowallet/microservices/user-service/proto/user";

service UserService {
  rpc GetUserByID (GetUserRequest) returns (UserResponse);
  rpc GetUserByEmail (GetUserByEmailRequest) returns (UserResponse);
  rpc CreateUser (CreateUserRequest) returns (UserResponse);
  rpc CleanupExpiredOTPs (CleanupRequest) returns (CleanupResponse);
  rpc FetchEventsToArchive (FetchEventsToArchiveRequest) returns (FetchEventsToArchiveResponse);
  rpc DeleteArchivedEvents (DeleteArchivedEventsRequest) returns (DeleteArchivedEventsResponse);
}

message OutboxEvent {
  string id = 1;
  string event_type = 2;
  string payload = 3;
  string status = 4;
  string created_at = 5;
}

message FetchEventsToArchiveRequest {
  int64 min_age_seconds = 1;
  int32 limit = 2;
}

message FetchEventsToArchiveResponse {
  repeated OutboxEvent events = 1;
}

message DeleteArchivedEventsRequest {
  repeated string ids = 1;
}

message DeleteArchivedEventsResponse {
  bool success = 1;
  string error = 2;
}

message CleanupRequest {}

message CleanupResponse {
  int32 deleted_count = 1;
}

message GetUserRequest {
  string id = 1;
}

message GetUserByEmailRequest {
  string email = 1;
}

message CreateUserRequest {
  string full_name = 1;
  string email = 2;
  string oauth_provider = 3; // empty if password-based
  string oauth_id = 4;       // empty if password-based
  string avatar_url = 5;     // empty if none
}

message UserResponse {
  string id = 1;
  string full_name = 2;
  string email = 3;
  string password_hash = 4; // Needed by Auth Service for login verification
  string role = 5;          // Needed by Auth Service to generate JWT with role
  bool is_verified = 6;
}
