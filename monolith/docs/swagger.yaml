basePath: /api/v1
definitions:
  errors.AppError:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  model.CreateUserRequest:
    properties:
      email:
        type: string
      full_name:
        type: string
      password:
        description: more long, better
        minLength: 6
        type: string
    required:
    - email
    - full_name
    - password
    type: object
  model.User:
    properties:
      created_at:
        type: string
      deleted_at:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: string
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: bashocode@gmail.com
    name: API Support
  description: API Documentation for GoWallet
  title: GoWallet Monolith API
  version: "1.0"
paths:
  /users/{id}:
    get:
      consumes:
      - application/json
      description: Get user profile by user ID
      parameters:
      - description: user id (uuid)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.User'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Get User Profile
      tags:
      - Users
  /users/register:
    post:
      consumes:
      - application/json
      description: Create new User with default wallet
      parameters:
      - description: register user payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Register New User
      tags:
      - Users
swagger: "2.0"
